<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        <title>Рекреационная инфраструктура Краснодара</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background-color: #f0f4f0;
                font-family: 'Segoe UI', Arial, sans-serif;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }

            /* ===== ШАПКА ===== */
            header {
                background-color: #2d6a2d;
                color: #ffffff;
                padding: 18px 32px 14px;
                box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            }

            header h1 {
                font-size: 1.6rem;
                font-weight: 700;
                letter-spacing: 0.02em;
            }

            header p.subtitle {
                font-size: 0.95rem;
                color: #c8e6c8;
                margin-top: 4px;
                font-weight: 400;
            }

            /* ===== ОСНОВНАЯ ОБЛАСТЬ ===== */
            main {
                flex: 1;
                display: flex;
                justify-content: center;
                align-items: flex-start;
                padding: 24px 32px;
            }

            .map-wrapper {
                width: 100%;
                max-width: 1400px;
                border: 4px solid #2d6a2d;
                border-radius: 8px;
                overflow: hidden;
                box-shadow: 0 4px 16px rgba(45, 106, 45, 0.25);
            }

            #map {
                width: 100%;
                height: 75vh;
                min-height: 480px;
            }

            /* ===== ПОПАП ===== */
            #map .ol-popup {
                background: #fff;
                border: 1px solid #2d6a2d;
                border-radius: 6px;
                padding: 10px 14px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            }

            /* ===== КОНТРОЛЫ ===== */
            .ol-control > * {
                background-color: #f8f8f8 !important;
                color: #444444 !important;
                border-radius: 0px;
            }
            .ol-attribution a,
            .gcd-gl-input::placeholder,
            .search-layer-input-search::placeholder {
                color: #444444 !important;
            }
            .search-layer-input-search {
                background-color: #f8f8f8 !important;
            }
            .ol-control > *:focus,
            .ol-control > *:hover {
                background-color: rgba(248, 248, 248, 0.7) !important;
            }
            .ol-control {
                background-color: rgba(255,255,255,.4) !important;
                padding: 2px !important;
            }

            /* ===== ФУТЕР ===== */
            footer {
                background-color: #2d6a2d;
                color: #c8e6c8;
                text-align: center;
                padding: 12px 32px;
                font-size: 0.85rem;
            }

            footer a {
                color: #ffffff;
                text-decoration: none;
                font-weight: 600;
                border-bottom: 1px solid rgba(255,255,255,0.4);
                transition: border-color 0.2s;
            }

            footer a:hover {
                border-color: #ffffff;
            }
        </style>
    </head>
    <body>

        <!-- ШАПКА -->
        <header>
            <h1>Рекреационная инфраструктура Краснодара</h1>
            <p class="subtitle">Парки и озеленённые территории</p>
        </header>

        <!-- КАРТА -->
        <main>
            <div class="map-wrapper">
                <div id="map">
                    <div id="popup" class="ol-popup">
                        <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                        <div id="popup-content"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- ФУТЕР -->
        <footer>
            <p>Исходный код и документация проекта: <a href="https://github.com/cornflakestein/web-gis-krasnodar" target="_blank">GitHub</a></p>
        </footer>

        <!-- СКРИПТЫ -->
        <script src="resources/qgis2web_expressions.js"></script>
        <script src="resources/proj4.js"></script>
        <script>proj4.defs('EPSG:32637','+proj=utm +zone=37 +datum=WGS84 +units=m +no_defs');</script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="resources/olms.js"></script>
        <script src="layers/_1.js"></script><script src="layers/_2.js"></script><script src="layers/_3.js"></script><script src="layers/_4.js"></script>
        <script src="styles/_1_style.js"></script><script src="styles/_2_style.js"></script><script src="styles/_3_style.js"></script><script src="styles/_4_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script>
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>
    </body>
</html>
